# ============================================================================
# Rootz Platform - Root Configuration Template
# Copy to ~/.rootz/config.ini and customize
# ============================================================================

[platform]
# Basic platform settings
port=4080
https_port=4443
environment=development
version=1.0.0

# Platform features
enableHttps=false
enableCors=true
enableRateLimit=true

[database]
# OCI MySQL Database Configuration
# Replace with your actual OCI MySQL credentials
host=mysql.sub07192123581.rootzvcn.oraclevcn.com
port=3306
name=rootz_platform
username=admin
password=YOUR_MYSQL_PASSWORD_HERE
maxConnections=10

[services]
# Enable/disable platform services
emailWallet=true
secretsManagement=false
aiWallet=false

[logging]
# Logging configuration
level=info
enableConsole=true
enableFile=true
filename=platform.log
maxFileSize=10MB
maxFiles=5

[security]
# Security settings
jwtSecret=AUTO_GENERATED_ON_INIT
sessionTimeout=24h
enableApiKey=false
corsOrigins=http://localhost:3000,http://localhost:4080

[blockchain]
# Blockchain network settings
network=amoy
chainId=80002
enableRealTransactions=true

# RPC endpoints
rpcUrl=https://rpc-amoy.polygon.technology/
backupRpcUrl=https://polygon-amoy-bor-rpc.publicnode.com

# Service wallet (for automated operations)
serviceWalletPrivateKey=YOUR_PRIVATE_KEY_HERE
serviceWalletAddress=YOUR_WALLET_ADDRESS_HERE

# Smart contract addresses (update with your deployed contracts)
contractRegistration=0x71C1d6a0DAB73b25dE970E032bafD42a29dC010F
contractEmailDataWallet=0x52eBB3761D36496c29FB6A3D5354C449928A4048

# Gas settings
gasLimit=500000
gasPriceMultiplier=1.1
maxGasPriceGwei=100

# Credit system
defaultUserCredits=60
emailWalletCost=3
attachmentCost=2
processingCost=1

[ipfs]
# IPFS configuration for distributed storage
url=https://rootz.digital/api/v0
provider=pinata
pinataApiKey=YOUR_PINATA_API_KEY
pinataSecretKey=YOUR_PINATA_SECRET_KEY
pinataJWT=YOUR_PINATA_JWT

[email]
# Email processing configuration
enabled=true
autoProcessEmails=true
requireUserAuthorization=true
defaultCreditCost=3

# Microsoft Graph API (optional)
tenantId=YOUR_TENANT_ID_HERE
clientId=YOUR_CLIENT_ID_HERE
clientSecret=YOUR_CLIENT_SECRET_HERE
userPrincipalName=process@yourdomain.com