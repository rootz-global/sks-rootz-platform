# ============================================================================
# OCI MySQL Database Configuration
# For OCID: ocid1.mysqldbsystem.oc1.iad.aaaaaaaahgyziw2hfzym6ryft3aorfo77xdvohs5yw3sstd4f4k2jdgibhoa
# ============================================================================

[database]
# OCI MySQL Connection Details
# These values should be customized based on your OCI MySQL setup
host=mysql.sub07192123581.rootzvcn.oraclevcn.com
port=3306
name=rootz_platform
username=admin
password=YOUR_OCI_MYSQL_PASSWORD_HERE
maxConnections=20

# SSL Configuration for OCI (recommended)
ssl=true
sslRejectUnauthorized=false

# Connection timeouts (adjust for OCI network latency)
connectionTimeout=60000
acquireTimeout=60000

# ============================================================================
# Environment Variable Overrides (Recommended for Production)
# ============================================================================
# 
# Instead of storing passwords in config files, use environment variables:
# 
# export DATABASE_HOST="mysql.sub07192123581.rootzvcn.oraclevcn.com"
# export DATABASE_PORT="3306"
# export DATABASE_NAME="rootz_platform"
# export DATABASE_USERNAME="admin"
# export DATABASE_PASSWORD="your-secure-password-here"
# export DATABASE_MAX_CONNECTIONS="20"
# 
# The Config class will automatically use these environment variables
# when they are set, overriding the INI file values.
# ============================================================================

[platform]
# Recommended settings for OCI deployment
environment=production
enableHttps=true
enableCors=true
port=8000
https_port=8443

[logging]
# Production logging settings
level=warn
enableConsole=true
enableFile=true
filename=/var/log/rootz-platform/platform.log
maxFileSize=50MB
maxFiles=10

[security]
# Production security settings
jwtSecret=GENERATE_STRONG_SECRET_HERE
sessionTimeout=12h
enableApiKey=true
corsOrigins=https://yourdomain.com,https://www.yourdomain.com

# SSL certificate paths (when using HTTPS)
sslCertPath=/etc/ssl/certs/yourdomain.com.crt
sslKeyPath=/etc/ssl/private/yourdomain.com.key