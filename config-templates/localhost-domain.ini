# ============================================================================
# Rootz Platform - localhost Domain Configuration
# Copy to ~/.rootz/localhost/config.ini and customize
# ============================================================================

[platform]
# Domain-specific platform settings for localhost
domain=localhost
environment=development

# Development-specific overrides
enableHttps=false
corsOrigins=http://localhost:3000,http://localhost:4080,http://localhost:8080

[database]
# Development database settings (override root config if needed)
# host=localhost
# name=rootz_platform_dev
# username=root
# password=localpassword

[logging]
# Development logging settings
level=debug
enableConsole=true
enableDebug=true

[blockchain]
# Development blockchain settings
enableRealTransactions=false
network=amoy

[email]
# Development email settings
enabled=false
autoProcessEmails=false
requireUserAuthorization=true

[development]
# Development-only settings
enableDebugLogging=true
enableHotReload=false
enableTestingMode=true
mockExternalServices=false